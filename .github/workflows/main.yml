name: INDIPLEX_24_7_BOT

on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein chalega
  workflow_dispatch: # Manual run ke liye

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # cloudscraper ki jagah curl_cffi dal diya hai
          pip install curl_cffi beautifulsoup4 pymongo certifi

      - name: Run Bot
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python scraper.py
