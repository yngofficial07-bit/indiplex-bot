name: INDIPLEX_24_7_BOT

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Naye stealth code ke liye ye libraries zaroori hain
          pip install curl_cffi beautifulsoup4 pymongo certifi requests lxml

      - name: Run Bot
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python scraper.py
