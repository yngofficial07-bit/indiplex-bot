<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndiPlex - Latest Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; scroll-behavior: smooth; }
        .movie-card:hover img { transform: scale(1.1); }
        .movie-card img { transition: 0.4s; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0891b2; }

        .search-glass {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-gray-700 pb-8 gap-6">
            <div>
                <h1 class="text-4xl font-black text-cyan-400 tracking-tighter italic">INDIPLEX</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                    </span>
                    <span class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em]">Live Feed Active</span>
                </div>
            </div>

            <div class="w-full md:w-96 relative">
                <input type="text" id="movie-search" placeholder="Search movies or series..." 
                    class="w-full py-3 px-5 pr-12 rounded-xl search-glass text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all"
                >
                <div class="absolute right-4 top-3.5 text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
        </header>

        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500 italic">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full mb-4"></div>
                <p>Syncing with database...</p>
            </div>
        </div>
    </div>

    <script>
        let allMovies = [];

        async function loadMovies() {
            try {
                const response = await fetch('./movies.json?v=' + new Date().getTime());
                if (!response.ok) throw new Error('Database not found');
                
                allMovies = await response.json();
                displayMovies(allMovies);

                // Search Logic
                document.getElementById('movie-search').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
                    displayMovies(filtered);
                });

            } catch (error) {
                console.error(error);
                document.getElementById('movie-grid').innerHTML = `
                    <div class="col-span-full text-center bg-red-500/10 border border-red-500/20 p-10 rounded-xl">
                        <p class="text-red-400 font-bold">Error: Connection failed.</p>
                        <p class="text-gray-500 text-sm mt-2">Check if movies.json exists in your repo.</p>
                    </div>`;
            }
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';

            if (movies.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-500">No movies found matching your search.</p>`;
                return;
            }

            movies.forEach(movie => {
                // Using Weserv proxy for images
                const posterUrl = `https://images.weserv.nl/?url=${encodeURIComponent(movie.poster)}&w=300&h=450&fit=cover`;

                grid.innerHTML += `
                    <div class="movie-card bg-slate-800/50 border border-slate-700/50 rounded-xl overflow-hidden shadow-2xl hover:border-cyan-500/50 transition-all duration-300">
                        <div class="relative overflow-hidden h-72 bg-slate-900">
                            <img src="${posterUrl}" 
                                 alt="Poster" 
                                 class="w-full h-full object-cover" 
                                 loading="lazy"
                                 onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
                        </div>
                        <div class="p-4">
                            <h3 class="text-sm font-bold truncate mb-3 text-gray-200" title="${movie.title}">${movie.title}</h3>
                            <a href="${movie.link}" target="_blank" 
                               class="block w-full py-2 text-center bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold rounded-lg shadow-lg transition-all duration-300">
                               DOWNLOAD NOW
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        loadMovies();
    </script>
</body>
</html>
